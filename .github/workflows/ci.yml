name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    name: Server (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      APP_ENV: test
      DATA_DIR: /tmp/night-diary-test
      MODEL_KEY_SECRET: ci-test-model-secret-1234567890
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: server/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy app

      - name: Pytest
        run: pytest -q

  web:
    name: Web (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Vitest
        run: npm run test

      - name: Build
        run: npm run build
